name: Test OCP Console Embed Webhook

on:
  pull_request:
    paths:
      - 'roles/ocp4_workload_ocp_console_embed/files/**'
      - 'roles/ocp4_workload_ocp_console_embed/tests/**'
  push:
    branches: [main]
    paths:
      - 'roles/ocp4_workload_ocp_console_embed/files/**'
      - 'roles/ocp4_workload_ocp_console_embed/tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run tests
        working-directory: roles/ocp4_workload_ocp_console_embed
        run: python -m unittest discover -s tests -v
